name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # The Flutter app lives in cv_app/ (the repo root is a mixed Python/Flutter project).
    defaults:
      run:
        working-directory: cv_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5
      - run: flutter pub get
      # Project site is served from /<repo>/, so set the base href to match.
      - run: flutter build web --release --base-href "/carvoaria-bistro/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: cv_app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
